name: SMSML CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  mlops-pipeline:

    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # CHECKOUT REPOSITORY
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================================
      # SETUP PYTHON
      # =====================================================

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =====================================================
      # CHECK ENVIRONMENT
      # =====================================================

      - name: Check Environment
        run: |
          python --version
          pip --version
          pwd
          ls -la

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies
        run: |
          pip install --upgrade pip

          pip install -r requirements.txt

          if [ -f Membangun_model/requirements.txt ]; then
            pip install -r Membangun_model/requirements.txt
          fi

      # =====================================================
      # INSTALL EXTRA MLFLOW DEPENDENCIES
      # =====================================================

      - name: Install MLflow Dependencies
        run: |
          pip install mlflow
          pip install docker
          pip install virtualenv

      # =====================================================
      # RUN MODELLING
      # =====================================================

      - name: Run MLflow Modelling
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |
          python Membangun_model/modelling.py

      # =====================================================
      # VERIFY GENERATED ARTIFACTS
      # =====================================================

      - name: Check MLflow Artifacts
        run: |
          echo "=== ROOT PROJECT ==="
          ls -la

          echo "=== MLRUNS ==="
          ls -R mlruns || true

          echo "=== MLARTIFACTS ==="
          ls -R mlartifacts || true

      # =====================================================
      # UPLOAD ARTIFACTS
      # =====================================================

      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smsml-mlflow-artifacts
          path: |
            mlruns/
            mlartifacts/
            preprocessing/artifacts/

      # =====================================================
      # GET LATEST MODEL PATH
      # =====================================================

      - name: Get Latest Model Path
        run: |

          MODEL_PATH=$(find mlartifacts \
          -type d \
          -path "*/artifacts" | sort | tail -n 1)

          echo "MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV

          echo "Detected Model Path:"
          echo "$MODEL_PATH"

      # =====================================================
      # BUILD DOCKER IMAGE
      # =====================================================

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |

          echo "Using model path:"
          echo "$MODEL_PATH"

          mlflow models build-docker \
            -m "$MODEL_PATH" \
            -n "smsml-xgboost:v1" \
            --env-manager local

      # =====================================================
      # LOGIN DOCKER HUB
      # =====================================================

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =====================================================
      # TAG IMAGE
      # =====================================================

      - name: Tag Docker Image
        run: |
          docker tag smsml-xgboost:v1 \
          ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

      # =====================================================
      # PUSH IMAGE
      # =====================================================

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

      # =====================================================
      # VERIFY PUSH
      # =====================================================

      - name: Verify Docker Push
        run: |
          echo "Docker image pushed successfully"

      # =====================================================
      # COMPLETE PIPELINE
      # =====================================================

      - name: Complete CI Pipeline
        run: |
          echo "SMSML CI Pipeline completed successfully"