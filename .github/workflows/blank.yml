name: SMSML CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  mlops-pipeline:

    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # CHECKOUT REPOSITORY
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================================
      # SETUP PYTHON
      # =====================================================

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies
        run: |

          pip install --upgrade pip

          pip install -r requirements.txt

          pip install mlflow
          pip install virtualenv
          pip install docker

      # =====================================================
      # CLEAN PREVIOUS ARTIFACTS
      # =====================================================

      - name: Clean Previous Artifacts
        run: |

          rm -rf mlruns || true
          rm -rf mlartifacts || true
          rm -f mlflow.db || true

      # =====================================================
      # RUN MLFLOW PROJECT
      # =====================================================

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |

          mlflow run MLProject \
          --experiment-name smsml-basic-experiment

      # =====================================================
      # VERIFY GENERATED ARTIFACTS
      # =====================================================

      - name: Verify MLflow Artifacts
        run: |

          echo "=== MLRUNS ==="
          ls -R mlruns || true

          echo "=== MLARTIFACTS ==="
          ls -R mlartifacts || true

      # =====================================================
      # GET LATEST MODEL PATH
      # =====================================================

      - name: Get Latest Model Path
        run: |

          MODEL_PATH=$(find mlartifacts \
          -type f \
          -name "MLmodel" | tail -n 1)

          MODEL_DIR=$(dirname "$MODEL_PATH")

          echo "MODEL_DIR=$MODEL_DIR" >> $GITHUB_ENV

          echo "Detected Model Directory:"
          echo "$MODEL_DIR"

      # =====================================================
      # BUILD DOCKER IMAGE
      # =====================================================

      - name: Build Docker Image
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: |

          echo "Building Docker Image..."

          mlflow models build-docker \
            -m "$MODEL_DIR" \
            -n "smsml-xgboost:v1" \
            --env-manager local

      # =====================================================
      # LOGIN TO DOCKER HUB
      # =====================================================

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # =====================================================
      # TAG DOCKER IMAGE
      # =====================================================

      - name: Tag Docker Image
        run: |

          docker tag smsml-xgboost:v1 \
          ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

      # =====================================================
      # PUSH DOCKER IMAGE
      # =====================================================

      - name: Push Docker Image
        run: |

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/smsml-xgboost:v1

      # =====================================================
      # UPLOAD MLFLOW ARTIFACTS
      # =====================================================

      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smsml-mlflow-artifacts
          path: |
            mlruns/
            mlartifacts/

      # =====================================================
      # COMPLETE PIPELINE
      # =====================================================

      - name: Complete CI Pipeline
        run: |

          echo "SMSML CI Pipeline completed successfully"